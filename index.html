<!doctype html>
	<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>Hoppy Bird</title>
		<link rel="icon" type="image/png" href="./UI/html_icon.png">
		
		<style>
			html, body {
				height: 100%;
				margin: 0;
				background: #000;
				overflow: hidden;
				touch-action: manipulation;
				user-select: none;
				-webkit-user-select: none;
			}

			/* Center the game on screen */
			.wrap {
				height: 100vh;
				width: 100vw;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #000;
			}

			/* Game keeps original aspect ratio (288x512) and fills screen height */
			canvas {
				height: 100vh;
				width: auto;
				display: block;
				image-rendering: auto;
			}

			/* If the screen is too narrow, prevent overflow by shrinking to fit width */
			@media (max-aspect-ratio: 288/512) {
				canvas {
					width: 100vw;
					height: auto;
				}
			}
		</style>
	</head>

	<body>
		<div class="wrap"><canvas id="game" width="288" height="512"></canvas></div>
	</body>
	
	<script src="hoppyScript.js"></script>

</html>
